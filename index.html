document.getElementById("title").textContent = DATA.title;

function cardClass(v) {
  return "card " + (v.variant || "");
}

function renderCards(id, arr) {
  document.getElementById(id).innerHTML = arr.map(x =>
    `<div class="${cardClass(x)}"><div class="label">${x.label}</div><div class="value">${x.value}</div></div>`
  ).join("");
}

function renderTable(id, rows, cols, totalLabel) {
  let finalRows = [...rows];
  if (totalLabel) {
    const total = {};
    total[cols[0].key] = totalLabel;
    for (const c of cols.slice(1)) {
      total[c.key] = rows.reduce((s, r) => s + (Number(r[c.key]) || 0), 0);
    }
    finalRows.push(total);
  }

  const head = "<tr>" + cols.map(c => `<th>${c.label}</th>`).join("") + "</tr>";
  const body = finalRows.map(r =>
    "<tr>" + cols.map(c => `<td class="${typeof r[c.key] === "number" ? "num" : ""}">${r[c.key] ?? ""}</td>`).join("") + "</tr>"
  ).join("");

  document.getElementById(id).innerHTML = `<table>${head}${body}</table>`;
}

function pie(id, rows) {
  new Chart(document.getElementById(id), {
    type: "pie",
    data: {
      labels: rows.map(r => r.name),
      datasets: [{ data: rows.map(r => r.value), backgroundColor: colors }]
    },
    options: {
      plugins: { legend: { display: false }, tooltip: { enabled: true } },
      maintainAspectRatio: false
    }
  });
}

function bar(id, rows) {
  const ordered = [...rows].reverse();
  new Chart(document.getElementById(id), {
    type: "bar",
    data: {
      labels: ordered.map(r => r.name),
      datasets: [{ label: "Evaluaciones", data: ordered.map(r => r.value), backgroundColor: "#5B9BD5" }]
    },
    options: {
      indexAxis: "y",
      plugins: { legend: { display: false } },
      scales: { x: { beginAtZero: true } },
      maintainAspectRatio: false
    }
  });
}
